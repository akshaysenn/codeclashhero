<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeClash — Global Leaderboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f;
            --bg2: #0d1017;
            --panel: #111520;
            --border: #1e2535;
            --accent: #00f5a0;
            --accent2: #ff3f5b;
            --accent3: #7b5cff;
            --text: #e8ecf5;
            --muted: #5a6480;
            --mono: 'Share Tech Mono', monospace;
            --head: 'Bebas Neue', sans-serif;
            --body: 'DM Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 4px);
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.18;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 100%);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.1;
            pointer-events: none;
            animation: pulse 6s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: var(--accent3);
            top: -150px;
            left: -100px;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .1;
                transform: scale(1)
            }

            50% {
                opacity: .16;
                transform: scale(1.08)
            }
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 4rem;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 10, 15, 0.9);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-family: var(--head);
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            text-decoration: none;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            font-family: var(--mono);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a.active {
            color: var(--accent);
        }

        .btn-logout {
            color: var(--accent2) !important;
            border: 1px solid var(--accent2);
            padding: 0.35rem 1rem;
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
            transition: background 0.2s !important;
        }

        .btn-logout:hover {
            background: rgba(255, 63, 91, 0.1) !important;
        }

        /* PAGE */
        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 7rem 2rem 5rem;
        }

        /* PAGE HEADER */
        .page-head {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.5s ease both;
        }

        .page-tag {
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            color: var(--accent3);
            text-transform: uppercase;
            margin-bottom: 0.7rem;
        }

        .page-title {
            font-family: var(--head);
            font-size: clamp(3rem, 7vw, 6rem);
            line-height: 0.95;
            letter-spacing: 0.02em;
        }

        .page-title span {
            color: var(--accent);
        }

        .page-sub {
            font-family: var(--mono);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-top: 1rem;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* PODIUM */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .podium-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .podium-slot:nth-child(1) {
            order: 2;
        }

        /* 1st = center */
        .podium-slot:nth-child(2) {
            order: 1;
        }

        /* 2nd = left */
        .podium-slot:nth-child(3) {
            order: 3;
        }

        /* 3rd = right */
        .podium-avatar {
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid;
            display: block;
        }

        .podium-avatar-ph {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--head);
            color: var(--bg);
            border: 3px solid;
        }

        .rank1 .podium-avatar,
        .rank1 .podium-avatar-ph {
            border-color: #ffd700;
        }

        .rank2 .podium-avatar,
        .rank2 .podium-avatar-ph {
            border-color: #c0c0c0;
        }

        .rank3 .podium-avatar,
        .rank3 .podium-avatar-ph {
            border-color: #cd7f32;
        }

        .rank1 .podium-avatar,
        .rank1 .podium-avatar-ph {
            width: 80px;
            height: 80px;
            font-size: 2.2rem;
        }

        .rank2 .podium-avatar,
        .rank2 .podium-avatar-ph,
        .rank3 .podium-avatar,
        .rank3 .podium-avatar-ph {
            width: 64px;
            height: 64px;
            font-size: 1.8rem;
        }

        .podium-name {
            font-family: var(--head);
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            text-align: center;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .podium-wins {
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .podium-platform {
            border: 1px solid;
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rank1 .podium-platform {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.06);
            min-width: 140px;
            height: 60px;
        }

        .rank2 .podium-platform {
            border-color: #c0c0c0;
            background: rgba(192, 192, 192, 0.04);
            min-width: 110px;
            height: 44px;
        }

        .rank3 .podium-platform {
            border-color: #cd7f32;
            background: rgba(205, 127, 50, 0.04);
            min-width: 110px;
            height: 34px;
        }

        .podium-rank-num {
            font-family: var(--head);
            font-size: 2rem;
        }

        .rank1 .podium-rank-num {
            color: #ffd700;
            font-size: 2.5rem;
        }

        .rank2 .podium-rank-num {
            color: #c0c0c0;
        }

        .rank3 .podium-rank-num {
            color: #cd7f32;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 320px;
        }

        .search-input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.78rem;
            letter-spacing: 0.05em;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent3);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .sort-tabs {
            display: flex;
            gap: 0px;
        }

        .sort-tab {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.55rem 1.2rem;
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--panel);
            margin-right: -1px;
        }

        .sort-tab:hover {
            color: var(--text);
            border-color: var(--accent3);
            z-index: 1;
        }

        .sort-tab.active {
            color: var(--accent3);
            border-color: var(--accent3);
            background: rgba(123, 92, 255, 0.08);
            z-index: 2;
        }

        .live-count {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .live-count span {
            color: var(--accent);
        }

        /* TABLE */
        .lb-table {
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeUp 0.5s 0.3s ease both;
        }

        .lb-head {
            display: grid;
            grid-template-columns: 70px 1fr 100px 100px 110px 100px;
            padding: 0.8rem 1.5rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .lb-row {
            display: grid;
            grid-template-columns: 70px 1fr 100px 100px 110px 100px;
            padding: 0.85rem 1.5rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
            transition: background 0.2s;
            cursor: default;
        }

        .lb-row:last-child {
            border-bottom: none;
        }

        .lb-row:hover {
            background: rgba(255, 255, 255, 0.025);
        }

        .lb-row.me {
            background: rgba(0, 245, 160, 0.04);
            border-left: 2px solid var(--accent);
        }

        .lb-row.me:hover {
            background: rgba(0, 245, 160, 0.07);
        }

        .lb-row.top3:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .col-rank {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank-num {
            font-family: var(--head);
            font-size: 1.5rem;
            min-width: 28px;
        }

        .rn-1 {
            color: #ffd700;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.4));
        }

        .rn-2 {
            color: #c0c0c0;
        }

        .rn-3 {
            color: #cd7f32;
        }

        .rn-other {
            color: var(--muted);
            font-size: 1.1rem;
        }

        .rank-medal {
            font-size: 1rem;
        }

        .col-player {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }

        .p-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid var(--border);
        }

        .p-avatar-ph {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--head);
            font-size: 1rem;
            color: var(--bg);
            border: 2px solid var(--border);
        }

        .p-name {
            font-weight: 500;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .p-you {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--accent);
            margin-left: 0.4rem;
            letter-spacing: 0.08em;
        }

        .col-wins {
            font-family: var(--mono);
            font-size: 0.88rem;
            color: var(--accent);
        }

        .col-loss {
            font-family: var(--mono);
            font-size: 0.88rem;
            color: var(--accent2);
        }

        .col-wr {}

        .wr-bar-mini {
            height: 4px;
            background: var(--border);
            border-radius: 0;
            overflow: hidden;
            margin-top: 3px;
        }

        .wr-fill-mini {
            height: 100%;
            background: linear-gradient(90deg, var(--accent3), var(--accent));
        }

        .wr-pct {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text);
        }

        .col-score {
            font-family: var(--head);
            font-size: 1.2rem;
            color: var(--accent3);
        }

        .empty {
            padding: 4rem;
            text-align: center;
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .no-results {
            padding: 2rem;
            text-align: center;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            display: none;
        }

        /* MY RANK BANNER */
        .my-rank-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: rgba(0, 245, 160, 0.04);
            border: 1px solid rgba(0, 245, 160, 0.2);
            margin-bottom: 1.5rem;
            animation: fadeUp 0.5s 0.25s ease both;
        }

        .mrb-label {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .mrb-rank {
            font-family: var(--head);
            font-size: 2.2rem;
            color: var(--accent);
        }

        .mrb-stats {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
        }

        .mrb-stats span {
            color: var(--text);
        }

        @media(max-width:800px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .page {
                padding: 6rem 1rem 3rem;
            }

            .lb-head,
            .lb-row {
                grid-template-columns: 50px 1fr 70px 70px;
            }

            .col-score,
            .col-loss {
                display: none;
            }

            .podium {
                gap: 0.5rem;
            }

            .rank1 .podium-avatar,
            .rank1 .podium-avatar-ph {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <nav>
        <a href="/" class="logo">CODE<span>CLASH</span></a>
        <div class="nav-links">
            <a href="/lobby">LOBBY</a>
            <a href="/profile">PROFILE</a>
            <a href="/leaderboard" class="active">LEADERBOARD</a>
            <a href="/auth/logout" class="btn-logout">LOGOUT</a>
        </div>
    </nav>

    <div class="page">

        <!-- Page Header -->
        <div class="page-head">
            <div class="page-tag">// global rankings</div>
            <h1 class="page-title">GLOBAL<br><span>LEADERBOARD</span></h1>
            <div class="page-sub" id="player-count">LOADING RANKINGS...</div>
        </div>

        <!-- Podium (top 3) -->
        <div class="podium" id="podium" style="display:none"></div>

        <!-- My rank banner -->
        <div class="my-rank-banner" id="my-rank-banner" style="display:none">
            <div>
                <div class="mrb-label">Your Rank</div>
                <div class="mrb-rank" id="mrb-rank">#—</div>
            </div>
            <div class="mrb-stats" id="mrb-stats"></div>
            <a href="/profile"
                style="font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:0.4rem 1rem">VIEW
                PROFILE →</a>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input class="search-input" id="search" type="text" placeholder="SEARCH PLAYER..." spellcheck="false"
                    autocomplete="off">
            </div>
            <div class="sort-tabs">
                <button class="sort-tab active" data-sort="wins">WINS</button>
                <button class="sort-tab" data-sort="wr">WIN RATE</button>
                <button class="sort-tab" data-sort="score">SCORE</button>
            </div>
            <div class="live-count" id="live-count"></div>
        </div>

        <!-- Table -->
        <div class="lb-table">
            <div class="lb-head">
                <span>RANK</span><span>PLAYER</span><span>WINS</span><span>LOSSES</span><span>WIN
                    RATE</span><span>SCORE</span>
            </div>
            <div id="lb-body">
                <div class="empty">LOADING...</div>
            </div>
            <div class="no-results" id="no-results">NO PLAYERS MATCHED YOUR SEARCH</div>
        </div>

    </div>

    <script>
        let allPlayers = [];
        let me = null;
        let sortKey = 'wins';

        async function init() {
            const [lbRes, meRes] = await Promise.all([
                fetch('/api/leaderboard'),
                fetch('/api/me').catch(() => null)
            ]);

            allPlayers = lbRes.ok ? await lbRes.json() : [];
            if (meRes && meRes.ok) me = await meRes.json();

            document.getElementById('player-count').textContent =
                allPlayers.length + ' PLAYER' + (allPlayers.length !== 1 ? 'S' : '') + ' RANKED GLOBALLY';
            document.getElementById('live-count').innerHTML =
                '<span>' + allPlayers.length + '</span> TOTAL PLAYERS';

            buildPodium();
            buildMyBanner();
            render();
        }

        function buildPodium() {
            const top3 = allPlayers.slice(0, 3);
            if (top3.length === 0) return;

            const podium = document.getElementById('podium');
            podium.style.display = 'flex';

            const rankLabels = ['rank1', 'rank2', 'rank3'];
            podium.innerHTML = top3.map((u, i) => {
                const cls = rankLabels[i];
                const av = u.avatar
                    ? `<img src="${u.avatar}" class="podium-avatar" style="width:${i === 0 ? 80 : 64}px;height:${i === 0 ? 80 : 64}px;">`
                    : `<div class="podium-avatar-ph" style="width:${i === 0 ? 80 : 64}px;height:${i === 0 ? 80 : 64}px;font-size:${i === 0 ? '2.2rem' : '1.8rem'};background:var(--accent3)">${u.name.charAt(0).toUpperCase()}</div>`;
                const total = u.wins + u.losses;
                const wr = total > 0 ? Math.round(u.wins / total * 100) : 0;
                return `
      <div class="podium-slot ${cls}">
        ${av}
        <div class="podium-name">${esc(u.name)}</div>
        <div class="podium-wins">${u.wins}W · ${wr}%</div>
        <div class="podium-platform"><span class="podium-rank-num">${i + 1}</span></div>
      </div>`;
            }).join('');
        }

        function buildMyBanner() {
            if (!me) return;
            const idx = allPlayers.findIndex(u => u.id === me.id);
            if (idx < 0) return;
            const rank = idx + 1;
            const total = me.wins + me.losses;
            const wr = total > 0 ? Math.round(me.wins / total * 100) : 0;
            const banner = document.getElementById('my-rank-banner');
            banner.style.display = 'flex';
            document.getElementById('mrb-rank').textContent = '#' + rank;
            document.getElementById('mrb-stats').innerHTML =
                `<span>${me.name}</span> &nbsp;·&nbsp; <span>${me.wins}</span> Wins &nbsp;·&nbsp; <span>${wr}%</span> Win Rate &nbsp;·&nbsp; <span>${(me.total_score || 0).toLocaleString()}</span> Score`;
        }

        function render() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            let list = [...allPlayers];

            // Sort
            list.sort((a, b) => {
                if (sortKey === 'wins') return b.wins - a.wins || b.total_score - a.total_score;
                if (sortKey === 'score') return b.total_score - a.total_score || b.wins - a.wins;
                if (sortKey === 'wr') {
                    const wrA = (a.wins + a.losses) > 0 ? a.wins / (a.wins + a.losses) : 0;
                    const wrB = (b.wins + b.losses) > 0 ? b.wins / (b.wins + b.losses) : 0;
                    return wrB - wrA || b.wins - a.wins;
                }
                return 0;
            });

            // Re-rank after sort
            const ranked = list.map((u, i) => ({ ...u, displayRank: i + 1 }));

            // Filter
            const filtered = query ? ranked.filter(u => u.name.toLowerCase().includes(query)) : ranked;

            const body = document.getElementById('lb-body');
            const noRes = document.getElementById('no-results');

            if (allPlayers.length === 0) {
                body.innerHTML = '<div class="empty">NO PLAYERS YET — BE THE FIRST TO BATTLE!</div>';
                noRes.style.display = 'none';
                return;
            }

            if (filtered.length === 0) {
                body.innerHTML = '';
                noRes.style.display = 'block';
                return;
            }

            noRes.style.display = 'none';
            const isMe = u => me && u.id === me.id;

            body.innerHTML = filtered.map(u => {
                const r = u.displayRank;
                const total = u.wins + u.losses;
                const wr = total > 0 ? Math.round(u.wins / total * 100) : 0;
                const rankNumClass = r === 1 ? 'rn-1' : r === 2 ? 'rn-2' : r === 3 ? 'rn-3' : 'rn-other';
                const medal = r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : '';
                const top3cls = r <= 3 ? 'top3' : '';
                const meCls = isMe(u) ? 'me' : '';
                const av = u.avatar
                    ? `<img src="${u.avatar}" class="p-avatar">`
                    : `<div class="p-avatar-ph" style="background:var(--accent3)">${u.name.charAt(0).toUpperCase()}</div>`;
                return `
      <div class="lb-row ${top3cls} ${meCls}">
        <div class="col-rank">
          <span class="rank-num ${rankNumClass}">${r}</span>
          ${medal ? `<span class="rank-medal">${medal}</span>` : ''}
        </div>
        <div class="col-player">
          ${av}
          <span class="p-name">${esc(u.name)}${isMe(u) ? '<span class="p-you">(you)</span>' : ''}</span>
        </div>
        <div class="col-wins">${u.wins}</div>
        <div class="col-loss">${u.losses}</div>
        <div class="col-wr">
          <div class="wr-pct">${wr}%</div>
          <div class="wr-bar-mini"><div class="wr-fill-mini" style="width:${wr}%"></div></div>
        </div>
        <div class="col-score">${(u.total_score || 0).toLocaleString()}</div>
      </div>`;
            }).join('');
        }

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Sort tabs
        document.querySelectorAll('.sort-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                sortKey = btn.dataset.sort;
                render();
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', render);

        init();
    </script>
</body>

</html>
