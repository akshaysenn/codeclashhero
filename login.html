<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeClash — Sign In</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f;
            --bg2: #0d1017;
            --panel: #111520;
            --border: #1e2535;
            --accent: #00f5a0;
            --accent2: #ff3f5b;
            --accent3: #7b5cff;
            --text: #e8ecf5;
            --muted: #5a6480;
            --mono: 'Share Tech Mono', monospace;
            --head: 'Bebas Neue', sans-serif;
            --body: 'DM Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px,
                    rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* Grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            animation: pulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: var(--accent3);
            top: -100px;
            left: -150px;
        }

        .orb2 {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.12;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.18;
            }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 10;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.6s ease both;
        }

        /* Top accent line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            font-family: var(--head);
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .logo span {
            color: var(--accent);
        }

        .tagline {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 2.8rem;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        /* Google Button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
            clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
        }

        .google-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 245, 160, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 245, 160, 0.15);
        }

        /* Google Logo SVG */
        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Info text */
        .info {
            margin-top: 2rem;
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            line-height: 1.7;
        }

        .info span {
            color: var(--accent);
        }

        /* Features list */
        .features {
            margin-top: 1.8rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature-pill {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 0.3rem 0.7rem;
        }

        /* Back link */
        .back-link {
            display: block;
            margin-top: 2rem;
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent3);
        }

        /* Error message */
        .error-msg {
            margin-bottom: 1.5rem;
            padding: 0.7rem 1rem;
            background: rgba(255, 63, 91, 0.08);
            border: 1px solid rgba(255, 63, 91, 0.3);
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent2);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="login-card">
        <div class="logo">CODE<span>CLASH</span></div>
        <div class="tagline">// enter the arena</div>

        <!-- Show error if auth failed -->
        <div id="error-msg" class="error-msg" style="display:none;">
            ⚠ Authentication failed. Please try again.
        </div>

        <div class="divider"><span>SIGN IN TO PLAY</span></div>

        <a href="/auth/google" class="google-btn">
            <!-- Google SVG Logo -->
            <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335"
                    d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.8 6c1.9-5.5 7-9.8 13.4-9.8z" />
                <path fill="#4285F4"
                    d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" />
                <path fill="#FBBC05"
                    d="M10.6 28.5c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5l-7.8-6C1 16.3 0 20 0 24s1 7.7 2.8 10.5l7.8-6z" />
                <path fill="#34A853"
                    d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-4.3-13.7-10l-7.7 6C6.5 42.5 14.6 48 24 48z" />
                <path fill="none" d="M0 0h48v48H0z" />
            </svg>
            CONTINUE WITH GOOGLE
        </a>

        <div class="features">
            <span class="feature-pill">⚡ REAL-TIME MATCHES</span>
            <span class="feature-pill">📊 TRACK STATS</span>
            <span class="feature-pill">🏆 LEADERBOARD</span>
        </div>

        <p class="info">
            Your <span>wins, losses & score</span> are saved automatically.<br>
            No password needed — just your Google account.
        </p>

        <a href="/" class="back-link">← BACK TO HOME</a>
    </div>

    <script>
        // Show error if redirected with ?error=true
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>

</html>
